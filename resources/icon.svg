  <g stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M64 64 L28 30"/>
    <path d="M64 64 L100 30"/>
    <path d="M64 64 L22 66"/>
    <path d="M64 64 L106 66"/>
    <path d="M64 64 L36 102"/>
    <path d="M64 64 L92 102"/>
  </g>

  <g fill="#ffffff">
    <circle cx="28" cy="30" r="5"/>
    <circle cx="100" cy="30" r="5"/>
    <circle cx="22" cy="66" r="5"/>
    <circle cx="106" cy="66" r="5"/>
    <circle cx="36" cy="102" r="5"/>
    <circle cx="92" cy="102" r="5"/>
