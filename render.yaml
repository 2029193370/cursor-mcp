# Render Blueprint：一键部署「发车/上车」短链服务端
# 使用：点击 README 里的 Deploy to Render 按钮，或在 Render 控制台
#       New + -> Blueprint -> 选择本仓库，Render 会自动读取此文件。
services:
  - type: web
    name: fache-server
    runtime: node
    plan: free
    region: singapore
    rootDir: fache-server
    buildCommand: ""
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      # 一次性领取，true = pickup 成功即删除
      - key: ONE_SHOT
        value: "true"
      # 车票最长存活 24 小时
      - key: MAX_TTL_MS
        value: "86400000"
      - key: NODE_VERSION
        value: "20"
