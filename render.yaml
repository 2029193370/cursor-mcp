# Render Blueprint：一键部署「发车/上车」短链服务端
# 使用：点击 README 里的 Deploy to Render 按钮，或在 Render 控制台
#       New + -> Blueprint -> 选择本仓库，Render 会自动读取此文件。
services:
  - type: web
    name: fache-server
    runtime: node
    plan: free
    region: singapore
    rootDir: fache-server
    buildCommand: ""
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      # 默认使用次数（客户端 publish 时可传 maxUses 覆盖；0 表示无限次）
      - key: DEFAULT_MAX_USES
        value: "1"
      # 单张车票使用次数上限（防滥用）
      - key: MAX_MAX_USES
        value: "1000"
      # 车票最长存活 24 小时
      - key: MAX_TTL_MS
        value: "86400000"
      - key: NODE_VERSION
        value: "20"
